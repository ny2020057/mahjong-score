<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🀄 麻雀スコア管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    const myUrl = 'https://oidnfkbxmkvqrdtqwcgc.supabase.co';
    const myKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pZG5ma2J4bWt2cXJkdHF3Y2djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NjgzODgsImV4cCI6MjA5ODE0NDM4OH0.RYGMUUVh5gT9k2G5Vbmb0mo6yasp9GjO4-wjvTa7xYA';
    window.db = supabase.createClient(myUrl, myKey);
  </script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

  <div class="max-w-xl mx-auto px-4 min-h-screen bg-slate-950">
    <header class="sticky top-0 z-30 bg-slate-950/90 backdrop-blur border-b border-slate-800 pb-2">
      <div class="py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xl">🀄</span>
          <h1 class="text-base font-bold tracking-wide text-white">麻雀スコア</h1>
        </div>
        <div id="syncing-indicator" class="text-xs text-amber-400 hidden animate-pulse">同期中…</div>
      </div>
      <div class="flex gap-1">
        <button id="tab-0" onclick="switchTab(0)" class="flex-1 py-1.5 rounded-md text-sm font-medium transition-colors bg-emerald-600 text-white">入力</button>
        <button id="tab-1" onclick="switchTab(1)" class="flex-1 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-400 hover:text-slate-200">履歴</button>
        <button id="tab-2" onclick="switchTab(2)" class="flex-1 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-400 hover:text-slate-200">統計</button>
      </div>
    </header>

    <main class="py-6 pb-20">
      
      <div id="content-tab-0" class="space-y-5">
        <section class="bg-slate-900 rounded-xl p-4 border border-slate-800">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">プレイヤー名</h2>
            <div id="player-action-area">
              <button onclick="toggleEditPlayers(true)" class="text-xs text-emerald-400 hover:text-emerald-300">編集</button>
            </div>
          </div>
          <div id="player-names-grid" class="grid grid-cols-2 gap-2">
            </div>
        </section>

        <section class="bg-slate-900 rounded-xl p-4 border border-slate-800">
          <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-3">対局情報</h2>
          <div class="flex gap-3">
            <div class="flex-1">
              <label class="text-xs text-slate-500 mb-1 block">対局日</label>
              <input type="date" id="input-game-date" onchange="autoCalcGameNo()" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500" style="color-scheme: dark;">
            </div>
            <div class="w-24">
              <label class="text-xs text-slate-500 mb-1 block">試合番号</label>
              <input type="number" id="input-game-no" min="1" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 text-center">
            </div>
          </div>
        </section>

        <section class="bg-slate-900 rounded-xl p-4 border border-slate-800">
          <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-3">最終点数を入力</h2>
          <div id="score-inputs-area" class="space-y-2">
            </div>
          <div id="input-error" class="mt-3 text-xs text-red-400 bg-red-950/40 rounded-lg px-3 py-2 hidden"></div>
        </section>

        <section id="preview-section" class="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden hidden">
          <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">プレビュー</h2>
            <span id="preview-meta" class="text-xs text-slate-500"></span>
          </div>
          <div id="preview-list" class="divide-y divide-slate-800">
            </div>
          <div class="px-4 py-3 border-t border-slate-800">
            <button onclick="submitGame()" id="submit-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-semibold rounded-lg py-2.5 transition-colors">
              対局を確定する
            </button>
          </div>
        </section>
      </div>

      <div id="content-tab-1" class="space-y-4 hidden">
        <div id="history-nav" class="text-sm hidden mb-4"></div>
        <div id="history-area"></div>
      </div>

      <div id="content-tab-2" class="space-y-6 hidden">
        <div id="stats-area"></div>
      </div>

    </main>
  </div>

  <script>
    let currentTab = 0;
    let players = ["東家", "南家", "西家", "北家"];
    let games = [];

    // 計算用定数
    const RETURN_POINTS = 30000;
    const INITIAL_POINTS = 25000;
    const OKA = ((RETURN_POINTS - INITIAL_POINTS) * 4) / 1000;

    // 便利関数
    function calcPoints(s) { return Math.round((s - RETURN_POINTS) / 1000); }
    function toDateStr(iso) { return iso.slice(0, 10); }
    function formatDate(d) { const [y, m, dd] = d.split("-"); return `${y}年${parseInt(m)}月${parseInt(dd)}日`; }
    function todayStr() { return new Date().toLocaleDateString("sv-SE"); }
    
    function calcGameResult(entries) {
      const sorted = [...entries].map((e, i) => ({ ...e, idx: i })).sort((a, b) => b.score - a.score || a.idx - b.idx);
      return entries.map((e, i) => {
        const rank = sorted.findIndex(s => s.idx === i) + 1;
        let pts = calcPoints(e.score);
        if (rank === 1) pts += OKA;
        return { name: e.name, score: e.score, rank, pts };
      });
    }

    // 初期化
    window.onload = async function() {
      document.getElementById('input-game-date').value = todayStr();
      await reloadData();
      
      // リアルタイム同期設定
      window.db.channel('public-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'games' }, reloadData)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state' }, reloadData)
        .subscribe();
    };

    async function reloadData() {
      showSync(true);
      try {
        const { data: stateData } = await window.db.from("app_state").select("*").eq("key", "players").maybeSingle();
        if (stateData) players = stateData.value;

        const { data: gamesData } = await window.db.from("games").select("*").order("game_date", { ascending: false }).order("game_no", { ascending: false });
        if (gamesData) {
          games = gamesData.map(g => ({
            id: g.id,
            timestamp: g.created_at,
            gameDate: g.game_date,
            gameNo: g.game_no,
            results: g.results
          }));
        }
      } catch (e) {
        console.error("データ取得エラー:", e);
      }

      renderAll();
      showSync(false);
    }

    function showSync(show) {
      document.getElementById('syncing-indicator').style.display = show ? 'block' : 'none';
    }

    function switchTab(tabIdx) {
      currentTab = tabIdx;
      [0, 1, 2].forEach(i => {
        document.getElementById(`tab-${i}`).className = `flex-1 py-1.5 rounded-md text-sm font-medium transition-colors ${i === tabIdx ? "bg-emerald-600 text-white" : "text-slate-400 hover:text-slate-200"}`;
        document.getElementById(`content-tab-${i}`).style.display = i === tabIdx ? 'block' : 'none';
      });
      if(tabIdx === 1) { historyViewDate = null; historyViewGameId = null; }
      renderAll();
    }

    function renderAll() {
      renderInputTab();
      renderHistoryTab();
      renderStatsTab();
    }

    let isEditingPlayers = false;
    function renderInputTab() {
      const grid = document.getElementById('player-names-grid');
      grid.innerHTML = '';
      players.forEach((name, i) => {
        if (isEditingPlayers) {
          grid.innerHTML += `
            <div class="flex items-center gap-2">
              <span class="w-5 h-5 rounded bg-slate-700 text-xs flex items-center justify-center text-slate-400">${i + 1}</span>
              <input id="edit-player-${i}" value="${name}" class="flex-1 bg-slate-800 border border-slate-700 rounded px-2 py-0.5 text-sm text-white focus:outline-none focus:border-emerald-500">
            </div>`;
        } else {
          grid.innerHTML += `
            <div class="flex items-center gap-2">
              <span class="w-5 h-5 rounded bg-slate-700 text-xs flex items-center justify-center text-slate-400">${i + 1}</span>
              <span class="text-sm text-white">${name}</span>
            </div>`;
        }
      });

      const scoreArea = document.getElementById('score-inputs-area');
      if (scoreArea.children.length !== 4 || scoreArea.getAttribute('data-players') !== players.join(',')) {
        scoreArea.setAttribute('data-players', players.join(','));
        scoreArea.innerHTML = '';
        players.forEach((name, i) => {
          scoreArea.innerHTML += `
            <div class="flex items-center gap-3">
              <label class="w-16 text-sm text-slate-400 truncate">${name}</label>
              <input type="number" id="score-input-${i}" placeholder="例: 25000" oninput="calcPreview()" class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-emerald-500">
            </div>`;
        });
      }
      autoCalcGameNo();
    }

    function toggleEditPlayers(edit) {
      isEditingPlayers = edit;
      const actionArea = document.getElementById('player-action-area');
      if (edit) {
        actionArea.innerHTML = `
          <div class="flex gap-2">
            <button onclick="savePlayerNames()" class="text-xs text-emerald-400 hover:text-emerald-300">保存</button>
            <button onclick="toggleEditPlayers(false); renderAll();" class="text-xs text-slate-500 hover:text-slate-400">キャンセル</button>
          </div>`;
      } else {
        actionArea.innerHTML = `<button onclick="toggleEditPlayers(true); renderAll();" class="text-xs text-emerald-400 hover:text-emerald-300">編集</button>`;
      }
      renderAll();
    }

    async function savePlayerNames() {
      showSync(true);
      const newNames = [0, 1, 2, 3].map(i => document.getElementById(`edit-player-${i}`).value.trim() || players[i]);
      players = newNames;
      await window.db.from("app_state").upsert({ key: "players", value: newNames });
      isEditingPlayers = false;
      toggleEditPlayers(false);
      await reloadData();
    }

    function autoCalcGameNo() {
      const dateVal = document.getElementById('input-game-date').value;
      const sameDay = games.filter(g => g.gameDate === dateVal);
      const nextNo = sameDay.reduce((m, g) => Math.max(m, g.gameNo || 0), 0) + 1;
      if (!document.getElementById('input-game-no').value || document.activeElement !== document.getElementById('input-game-no')) {
        document.getElementById('input-game-no').value = nextNo;
      }
    }

    let currentPreviewResults = null;
    function calcPreview() {
      const scores = [0, 1, 2, 3].map(i => parseInt(document.getElementById(`score-input-${i}`).value, 10));
      const errBox = document.getElementById('input-error');
      const prevSection = document.getElementById('preview-section');

      if (scores.some(isNaN)) {
        errBox.classList.add('hidden');
        prevSection.classList.add('hidden');
        return;
      }

      const total = scores.reduce((a, b) => a + b, 0);
      if (total !== 100000) {
        errBox.textContent = `合計 ${total.toLocaleString()} 点（100,000点になるよう入力してください）`;
        errBox.classList.remove('hidden');
        prevSection.classList.add('hidden');
        return;
      }

      errBox.classList.add('hidden');
      
      const entries = players.map((name, i) => ({ name, score: scores[i] }));
      currentPreviewResults = calcGameResult(entries);

      const dateVal = document.getElementById('input-game-date').value;
      const noVal = document.getElementById('input-game-no').value;
      document.getElementById('preview-meta').textContent = `${formatDate(dateVal)} 第${noVal}試合`;

      const list = document.getElementById('preview-list');
      list.innerHTML = '';
      [...currentPreviewResults].sort((a,b) => a.rank - b.rank).forEach(r => {
        const rankColors = { 1: "bg-amber-400 text-amber-900", 2: "bg-slate-400 text-slate-900", 3: "bg-amber-700 text-amber-100", 4: "bg-slate-700 text-slate-400" };
        list.innerHTML += `
          <div class="flex items-center gap-3 px-4 py-3">
            <span class="w-6 h-6 rounded-full font-bold flex items-center justify-center text-xs ${rankColors[r.rank]}">${r.rank}</span>
            <span class="flex-1 text-sm text-white">${r.name}</span>
            <span class="text-sm text-slate-400">${r.score.toLocaleString()}点</span>
            <span class="text-sm font-bold w-14 text-right ${r.pts >= 0 ? "text-emerald-400" : "text-red-400"}">${r.pts >= 0 ? '+' + r.pts : r.pts}</span>
          </div>`;
      });
      prevSection.classList.remove('hidden');
    }

    async function submitGame() {
      if (!currentPreviewResults) return;
      const dateVal = document.getElementById('input-game-date').value;
      const noVal = parseInt(document.getElementById('input-game-no').value, 10);
      
      showSync(true);
      await window.db.from("games").insert([{ game_date: dateVal, game_no: noVal, results: currentPreviewResults }]);
      
      [0, 1, 2, 3].forEach(i => document.getElementById(`score-input-${i}`).value = '');
      document.getElementById('preview-section').classList.add('hidden');
      currentPreviewResults = null;
      
      const btn = document.getElementById('submit-btn');
      btn.textContent = "✓ 保存しました";
      setTimeout(() => btn.textContent = "対局を確定する", 2000);
      
      await reloadData();
    }

    let historyViewDate = null;
    let historyViewGameId = null;

    function renderHistoryTab() {
      const area = document.getElementById('history-area');
      const nav = document.getElementById('history-nav');
      
      if (games.length === 0) {
        nav.classList.add('hidden');
        area.innerHTML = '<div class="text-center py-16 text-slate-600"><p class="text-4xl mb-3">🀄</p><p class="text-sm">対局履歴がありません</p></div>';
        return;
      }

      if (historyViewGameId) {
        const g = games.find(x => x.id === historyViewGameId);
        if(!g) { historyViewGameId = null; renderHistoryTab(); return; }
        
        nav.innerHTML = `<button onclick="historyViewGameId=null; renderHistoryTab();" class="text-emerald-400 hover:text-emerald-300">${formatDate(g.gameDate)}</button> <span class="text-slate-600">›</span> <span class="text-slate-300">第${g.gameNo}試合</span>`;
        nav.classList.remove('hidden');

        let rowsHtml = '';
        [...g.results].sort((a,b)=>a.rank-b.rank).forEach(r => {
          const rankColors = { 1: "bg-amber-400 text-amber-900", 2: "bg-slate-400 text-slate-900", 3: "bg-amber-700 text-amber-100", 4: "bg-slate-700 text-slate-400" };
          rowsHtml += `
            <div class="flex items-center gap-3 px-4 py-3">
              <span class="w-6 h-6 rounded-full font-bold flex items-center justify-center text-xs ${rankColors[r.rank]}">${r.rank}</span>
              <span class="flex-1 text-sm text-white">${r.name}</span>
              <span class="text-sm text-slate-400">${r.score.toLocaleString()}点</span>
              <span class="text-sm font-bold w-14 text-right ${r.pts >= 0 ? 'text-emerald-400' : 'text-red-400'}">${r.pts >= 0 ? '+' + r.pts : r.pts}</span>
            </div>`;
        });

        area.innerHTML = `
          <div class="bg-slate-900 rounded-xl border border-slate-800 overflow-hidden">
            <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
              <p class="text-sm font-semibold text-white">${formatDate(g.gameDate)} 第${g.gameNo}試合</p>
              <button onclick="deleteGame('${g.id}')" class="text-xs text-slate-600 hover:text-red-400 transition-colors">削除</button>
            </div>
            <div class="divide-y divide-slate-800/60">${rowsHtml}</div>
          </div>`;
        return;
      }

      if (historyViewDate) {
        nav.innerHTML = `<button onclick="historyViewDate=null; renderHistoryTab();" class="text-emerald-400 hover:text-emerald-300">対局日一覧</button> <span class="text-slate-600">›</span> <span class="text-slate-300">${formatDate(historyViewDate)}</span>`;
        nav.classList.remove('hidden');

        const dayGames = [...games.filter(g => g.gameDate === historyViewDate)].sort((a,b) => a.gameNo - b.gameNo);
        let itemsHtml = '';
        dayGames.forEach(g => {
          const winner = g.results.find(r => r.rank === 1);
          itemsHtml += `
            <button onclick="historyViewGameId='${g.id}'; renderHistoryTab();" class="w-full bg-slate-900 hover:bg-slate-800 rounded-xl border border-slate-800 hover:border-slate-700 px-4 py-3 flex items-center justify-between transition-colors text-left flex">
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-slate-800 flex items-center justify-center text-sm font-bold text-white">${g.gameNo}</div>
                <div>
                  <p class="text-sm text-white font-medium">第${g.gameNo}試合</p>
                  <p class="text-xs text-slate-500 truncate">🥇 ${winner ? winner.name : 'ー'}</p>
                </div>
              </div>
              <span class="text-slate-600">›</span>
            </button>`;
        });
        area.innerHTML = `<div class="space-y-2">${itemsHtml}</div>`;
        return;
      }

      nav.classList.add('hidden');
      const byDate = {};
      games.forEach(g => {
        if (!byDate[g.gameDate]) byDate[g.gameDate] = [];
        byDate[g.gameDate].push(g);
      });
      const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));

      let listHtml = `<p class="text-xs text-slate-500 mb-2">${dates.length}日分の記録</p><div class="space-y-3">`;
      dates.forEach(d => {
        listHtml += `
          <button onclick="historyViewDate='${d}'; renderHistoryTab();" class="w-full bg-slate-900 hover:bg-slate-800 rounded-xl border border-slate-800 hover:border-slate-700 px-4 py-3.5 flex items-center justify-between transition-colors text-left flex">
            <div>
              <p class="text-sm font-semibold text-white">${formatDate(d)}</p>
              <p class="text-xs text-slate-500 mt-1">${byDate[d].length}試合の記録</p>
            </div>
            <span class="text-slate-600">›</span>
          </button>`;
      });
      listHtml += '</div>';
      area.innerHTML = listHtml;
    }

    async function deleteGame(id) {
      if(!confirm("削除しますか？")) return;
      showSync(true);
      await window.db.from("games").delete().eq("id", id);
      historyViewGameId = null;
      await reloadData();
    }

    function renderStatsTab() {
      const area = document.getElementById('stats-area');
      if (games.length === 0) {
        area.innerHTML = '<div class="text-center py-16 text-slate-600"><p class="text-4xl mb-3">📊</p><p class="text-sm">まだ対局データがありません</p></div>';
        return;
      }

      const stats = players.map(name => {
        const participated = games.filter(g => g.results.some(r => r.name === name));
        const count = participated.length;
        if (count === 0) return { name, count: 0, avgRank: "-", top1Rate: "-", totalPts: 0 };
        const results = participated.map(g => g.results.find(r => r.name === name));
        const totalPts = results.reduce((a, r) => a + r.pts, 0);
        return {
          name, count,
          avgRank: (results.reduce((a, r) => a + r.rank, 0) / count).toFixed(1),
          top1Rate: ((results.filter(r => r.rank === 1).length / count) * 100).toFixed(0),
          totalPts,
        };
      });

      const rankingData = [...stats].sort((a, b) => b.totalPts - a.totalPts);

      let rankingHtml = '<section><h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">累計ランキング</h2><div class="space-y-2">';
      rankingData.forEach((s, i) => {
        rankingHtml += `
          <div class="bg-slate-900 rounded-xl border border-slate-800 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="w-6 h-6 rounded-full bg-slate-800 flex items-center justify-center text-xs font-bold text-slate-400">${i + 1}</span>
              <span class="text-sm font-medium text-white">${s.name}</span>
            </div>
            <div class="text-right">
              <p class="text-base font-bold ${s.totalPts >= 0 ? 'text-emerald-400' : 'text-red-400'}">${s.totalPts >= 0 ? '+' + s.totalPts : s.totalPts}pt</p>
              <p class="text-xs text-slate-600">${s.count}局</p>
            </div>
          </div>`;
      });
      rankingHtml += '</div></section>';

      let detailsHtml = '<section><h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">個人詳細</h2><div class="grid grid-cols-2 gap-3">';
      stats.forEach(s => {
        detailsHtml += `
          <div class="bg-slate-900 rounded-xl border border-slate-800 p-4">
            <p class="text-sm font-semibold text-white mb-2 pb-1 border-b border-slate-800">${s.name}</p>
            <div class="space-y-1">
              <div class="flex justify-between text-xs"><span class="text-slate-500">対局数</span><span class="text-slate-200">${s.count}局</span></div>
              <div class="flex justify-between text-xs"><span class="text-slate-500">平均順位</span><span class="text-slate-200">${s.avgRank}位</span></div>
              <div class="flex justify-between text-xs"><span class="text-slate-500">1位率</span><span class="text-slate-200">${s.top1Rate}%</span></div>
            </div>
          </div>`;
      });
      detailsHtml += '</div></section>';

      area.innerHTML = rankingHtml + detailsHtml;
    }
  </script>
</body>
</html>
